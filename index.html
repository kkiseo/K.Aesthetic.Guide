<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitProgram</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#111;
    color:white;
}

header{
    text-align:center;
    padding:80px 20px;
}

h1{
    font-size:50px;
}

.btn{
    background:red;
    color:white;
    padding:15px 30px;
    text-decoration:none;
    border-radius:8px;
}

.products{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
    padding:50px;
}

.card{
    background:#222;
    padding:20px;
    border-radius:12px;
    width:250px;
    text-align:center;
}

.price{
    color:#00ff88;
    font-size:24px;
}
</style>
</head>

<body>

<header>
<h1>FIT PROGRAM</h1>

<p>Schede professionali per aumentare massa muscolare, dimagrire e migliorare le performance.</p>

<a href="#prodotti" class="btn">
Acquista Ora
</a>
</header>

<section id="prodotti" class="products">

<div class="card">
<h2>Principiante</h2>
<p>Allenamento 3 giorni a settimana.</p>
<div class="price">19€</div>
</div>

<div class="card">
<h2>Massa Muscolare</h2>
<p>Programma completo 12 settimane.</p>
<div class="price">29€</div>
</div>

<div class="card">
<h2>Dimagrimento</h2>
<p>Allenamento + cardio.</p>
<div class="price">24€</div>
</div>

</section>

</body>
</html>
